services:
  db:
    image: postgres:16-alpine
    container_name: stock_app_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-stock_db}
      POSTGRES_USER: ${DB_USER:-stock_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-stock_pass}
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-stock_user} -d ${DB_NAME:-stock_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: stock_app_backend
    volumes:
      - ./backend:/backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME:-stock_db}
      - DB_USER=${DB_USER:-stock_user}
      - DB_PASSWORD=${DB_PASSWORD:-stock_pass}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: python manage.py runserver 0.0.0.0:8000

  frontend:
    build:
      context: ./frontend
    container_name: stock_app_frontend
    volumes:
      - ./frontend:/frontend
      - /frontend/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend

# celery basically depends on db and redis, so same setup as backend in terms of deps and env
  # worker executes tasks
  celery-worker:
    build:
      context: ./backend
    container_name: stock_app_celery_worker
    volumes:
      - ./backend:/backend
    environment:
      - DEBUG=1
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME:-stock_db}
      - DB_USER=${DB_USER:-stock_user}
      - DB_PASSWORD=${DB_PASSWORD:-stock_pass}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A core worker -l info

# celery basically depends on db and redis, so same setup as backend in terms of deps and env
  # beat schedules tasks
  celery-beat:
    build:
      context: ./backend
    container_name: stock_app_celery_beat
    volumes:
      - ./backend:/backend
    environment:
      - DEBUG=1
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME:-stock_db}
      - DB_USER=${DB_USER:-stock_user}
      - DB_PASSWORD=${DB_PASSWORD:-stock_pass}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A core beat -l info

  redis:
    image: redis:7-alpine
    container_name: stock_app_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
